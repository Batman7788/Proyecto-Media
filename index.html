<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar — Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login" class="pantalla activa">
        <div class="caja-login">
            <div class="logo-login">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21V9l9-6 9 6v12"/>
                    <path d="M9 21V12h6v9"/>
                    <path d="M3 9h18"/>
                </svg>
                <span>Sistema Escolar</span>
            </div>

            <div class="roles">
                <div class="rol-btn" onclick="seleccionarRol('estudiante', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                    <span>Estudiante</span>
                </div>
                <div class="rol-btn" onclick="seleccionarRol('docente', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </svg>
                    <span>Docente</span>
                </div>
                <div class="rol-btn" onclick="seleccionarRol('directivo', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <span>Directivo</span>
                </div>
            </div>

            <div class="campo">
                <label>Usuario</label>
                <input type="text" id="usuario" placeholder="Ingresa tu usuario"/>
            </div>
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="clave" placeholder="••••••••" onkeydown="if(event.key==='Enter')ingresar()"/>
            </div>
            <button class="btn-ingresar" onclick="ingresar()">Ingresar</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
